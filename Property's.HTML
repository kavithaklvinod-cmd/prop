<html>
    <head>
        <title>Position</title>
        <style>
            div{
                border:3px solid green;
                right: 30px;
            }
            .absolute{
                position:absolute;
                border:3px solid blue;
                margin-top:80px;
                left:25px;
            }
            .sticky{
                position:sticky;
                border:3px solid brown;
                margin-top:20px;
                right:50px;
            }
            .relative{
            position: relative;
            left:25px;
                border:3px solid red;
            }
            .static{
                position:static;
                border:3px solid palevioletred;
            }
            .fixed{
                position: fixed;
                border:3px solid gold;
                margin: top 100px;
            }
            </style>
    </head>
    <body>
        <h2>Position</h2>
        <div class="absolute">Div with absolute property</div>
        <div class="fixed">Div with fixed property</div>
        <div class="relative">Div with relative property</div>
        <div class="sticky">Div with sticky property</div>
        <div class="static">Div with static property</div>

    </body>
</html>
